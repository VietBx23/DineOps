<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F&B Management System — ERD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f8f5;
    color: #1a1a18;
    padding: 2rem;
    min-height: 100vh;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    h1, p { color: #c2c0b6; }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
    color: #1a1a18;
  }
  p.sub {
    font-size: 13px;
    color: #73726c;
    margin-bottom: 1.5rem;
  }
  #erd { width: 100%; }
  #erd svg { width: 100%; height: auto; }
</style>
</head>
<body>
<h1>F&B Management System — ERD</h1>
<p class="sub">Multi-Store · Inventory · Role-Based Access (RBAC) · 16 entities</p>
<div id="erd"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  ORGANIZATION {
    ObjectId _id PK
    string name
    string status
    date createdAt
  }
  CITY {
    ObjectId _id PK
    string name
    ObjectId organizationId FK
  }
  STORE {
    ObjectId _id PK
    string name
    ObjectId cityId FK
    ObjectId organizationId FK
    string status
  }
  USER {
    ObjectId _id PK
    string name
    string email
    string password
    string role
    ObjectId organizationId FK
    ObjectId storeId FK
    string status
    date createdAt
  }
  TABLE {
    ObjectId _id PK
    string name
    string code
    ObjectId storeId FK
    string status
    date createdAt
  }
  ORDER {
    ObjectId _id PK
    ObjectId storeId FK
    ObjectId tableId FK
    string status
    date createdAt
  }
  ORDER_ITEM {
    ObjectId _id PK
    ObjectId orderId FK
    ObjectId productId FK
    int quantity
    string note
  }
  PRODUCT {
    ObjectId _id PK
    string name
    float price
    string category
    ObjectId storeId FK
  }
  RECIPE {
    ObjectId _id PK
    ObjectId productId FK
  }
  RECIPE_INGREDIENT {
    ObjectId _id PK
    ObjectId recipeId FK
    ObjectId ingredientId FK
    float quantity
  }
  INGREDIENT {
    ObjectId _id PK
    string name
    string unit
    ObjectId storeId FK
  }
  INVENTORY {
    ObjectId _id PK
    ObjectId ingredientId FK
    ObjectId storeId FK
    float quantity
    date updatedAt
  }
  STOCK_IMPORT {
    ObjectId _id PK
    ObjectId storeId FK
    date createdAt
  }
  STOCK_IMPORT_ITEM {
    ObjectId _id PK
    ObjectId importId FK
    ObjectId ingredientId FK
    float quantity
  }
  STOCK_EXPORT {
    ObjectId _id PK
    ObjectId storeId FK
    string type
    date createdAt
  }
  STOCK_EXPORT_ITEM {
    ObjectId _id PK
    ObjectId exportId FK
    ObjectId ingredientId FK
    float quantity
  }

  ORGANIZATION ||--o{ CITY : "has"
  ORGANIZATION ||--o{ STORE : "owns"
  CITY ||--o{ STORE : "contains"
  STORE ||--o{ USER : "employs"
  STORE ||--o{ TABLE : "has"
  STORE ||--o{ ORDER : "receives"
  STORE ||--o{ PRODUCT : "offers"
  STORE ||--o{ INGREDIENT : "stocks"
  STORE ||--o{ INVENTORY : "tracks"
  STORE ||--o{ STOCK_IMPORT : "imports"
  STORE ||--o{ STOCK_EXPORT : "exports"
  TABLE ||--o{ ORDER : "generates"
  ORDER ||--o{ ORDER_ITEM : "contains"
  PRODUCT ||--o{ ORDER_ITEM : "in"
  PRODUCT ||--|| RECIPE : "has"
  RECIPE ||--o{ RECIPE_INGREDIENT : "uses"
  INGREDIENT ||--o{ RECIPE_INGREDIENT : "in"
  INGREDIENT ||--|| INVENTORY : "tracked by"
  INGREDIENT ||--o{ STOCK_IMPORT_ITEM : "imported via"
  INGREDIENT ||--o{ STOCK_EXPORT_ITEM : "exported via"
  STOCK_IMPORT ||--o{ STOCK_IMPORT_ITEM : "has"
  STOCK_EXPORT ||--o{ STOCK_EXPORT_ITEM : "has"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body>
</html>
